        document.getElementById('convert-rsid-btn').addEventListener('click', () => {
            const errorEl = document.getElementById('error-message');
            const spinner = document.getElementById('spinner');
            const convertBtn = document.getElementById('convert-rsid-btn');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const playerIdHex = document.getElementById('player-id-input').value.trim();

            if (!playerIdHex) {
                errorEl.style.color = '#f96666'; // エラー色にリセット
                errorEl.textContent = "エラー：プレイヤーIDを入力してください。";
                errorEl.style.display = 'block';
                return;
            }

            try {
                Number(hexToBigInt(playerIdHex));
            } catch (e) {
                errorEl.style.color = '#f96666'; // エラー色にリセット
                errorEl.textContent = "エラー：プレイヤーIDは正しい16進数（例: cc0db7）で入力してください。";
                errorEl.style.display = 'block';
                return;
            }

            if (!currentRoundsData || currentRoundsData.length === 0) {
                errorEl.style.color = '#f96666'; // エラー色にリセット
                errorEl.textContent = "エラー：先に家系図を生成してください。";
                errorEl.style.display = 'block';
                return;
            }

            // UIの状態を更新
            errorEl.style.display = 'none';
            spinner.style.display = 'block';
            convertBtn.disabled = true;
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressText.textContent = '準備中...';

            // 現在の変換セッションIDを記録
            const thisSessionId = ++conversionSessionId;

            // キャッシュ機能の準備
            const RSID_CACHE_KEY = 'rsidConversionCache';
            let cache = {};
            try {
                const rawCache = localStorage.getItem(RSID_CACHE_KEY);
                if (rawCache) cache = JSON.parse(rawCache);
            } catch (e) { }

            function saveToCache(updates) {
                Object.assign(cache, updates);
                try {
                    localStorage.setItem(RSID_CACHE_KEY, JSON.stringify(cache));
                } catch (e) {
                    // QuotaExceededErrorなどの場合、キャッシュを一度クリアして最新分だけ保存
                    localStorage.removeItem(RSID_CACHE_KEY);
                    try {
                        localStorage.setItem(RSID_CACHE_KEY, JSON.stringify(updates));
                    } catch (e2) {
                        console.error('キャッシュの保存に失敗しました(容量不足):', e2);
                    }
                    cache = updates;
                }
            }

            function applyConvertedResults(results) {
                for (const result of results) {
                    if (result.newId) {
                        // 注意: node.id（元のRSID）は書き換えない。表示のみ更新する。
                        const cardEl = document.getElementById(result.uniqueId);
                        if (cardEl) {
                            const rsidTextEl = cardEl.querySelector('.rsid-text');
                            if (rsidTextEl) {
                                rsidTextEl.textContent = result.newId;
                            }
                            const qrEl = cardEl.querySelector('.qr-code');
                            if (qrEl) {
                                qrEl.innerHTML = '';
                                qrEl.dataset.id = result.newId;
                                const alphanumericOnlyId = result.newId.replace(/[^a-zA-Z0-9]/g, '');
                                new QRCode(qrEl, {
                                    text: alphanumericOnlyId,
                                    width: 150,
                                    height: 150
                                });
                            }
                        }
                    }
                }
            }

            // リーフノードを収集（常に originalId を使って変換する）
            const leafNodesToConvert = [];
            const cachedResults = [];
            for (const round of currentRoundsData) {
                for (const node of round) {
                    if (!node.participants || node.participants.length === 0) {
                        // originalId を使用（元のRSIDを基に変換）
                        const rsidForConversion = node.originalId || node.id;
                        if (!rsidForConversion) continue;

                        const cacheKey = `${playerIdHex}_${rsidForConversion}`;
                        if (cache[cacheKey]) {
                            cachedResults.push({ uniqueId: node.uniqueId, newId: cache[cacheKey], id: rsidForConversion });
                        } else {
                            leafNodesToConvert.push({ uniqueId: node.uniqueId, id: rsidForConversion });
                        }
                    }
                }
            }

            // キャッシュ済みの結果を即反映
            if (cachedResults.length > 0) {
                applyConvertedResults(cachedResults);
            }

            // 全てキャッシュにあった場合
            if (leafNodesToConvert.length === 0) {
                if (thisSessionId !== conversionSessionId) return; // 別の家系図に切り替え済み
                progressBar.style.width = '100%';
                progressText.textContent = '変換完了';
                spinner.style.display = 'none';
                convertBtn.disabled = false;
                errorEl.style.color = '#3ce4c8';
                errorEl.textContent = '全QRコードの変換が完了しました';
                errorEl.style.display = 'block';

                if (currentActiveHistoryId) {
                    saveConvertedPlayerIdToHistory(currentActiveHistoryId, playerIdHex);
                }
                return;
            }

            // 既存のWorkerがあれば終了
            if (rsidWorker) {
                rsidWorker.terminate();
            }

            // Web Workerを起動
            rsidWorker = new Worker('rsid-worker.js');

            let progressUpdateCounter = 0;

            rsidWorker.onmessage = (event) => {
                const data = event.data;

                // 別の家系図に切り替え済みならコールバックを無視
                if (thisSessionId !== conversionSessionId) {
                    rsidWorker.terminate();
                    rsidWorker = null;
                    return;
                }

                if (data.type === 'progress') {
                    progressUpdateCounter++;
                    if (progressUpdateCounter % 5 === 0 || data.current === data.total) {
                        requestAnimationFrame(() => {
                            const percent = Math.round((data.current / data.total) * 100);
                            progressBar.style.width = percent + '%';
                            progressText.textContent = data.message;
                        });
                    }
                } else if (data.type === 'result') {
                    const convertedNodes = data.convertedNodes;

                    // 新規変換結果をキャッシュに保存（originalId ベースのキーを使用）
                    const newCacheEntries = {};
                    for (const result of convertedNodes) {
                        if (result.newId) {
                            const originalNode = leafNodesToConvert.find(n => n.uniqueId === result.uniqueId);
                            if (originalNode && originalNode.id) {
                                // originalNode.id は元のRSID（originalId）が入っている
                                newCacheEntries[`${playerIdHex}_${originalNode.id}`] = result.newId;
                            }
                        }
                    }
                    saveToCache(newCacheEntries);

                    // 変換結果を反映
                    applyConvertedResults(convertedNodes);

                    // 完了表示
                    requestAnimationFrame(() => {
                        if (thisSessionId !== conversionSessionId) return; // 別の家系図に切り替え済み
                        progressBar.style.width = '100%';
                        progressText.textContent = '変換完了';
                        spinner.style.display = 'none';
                        convertBtn.disabled = false;
                        errorEl.style.color = '#3ce4c8'; // 成功色
                        errorEl.textContent = '全QRコードの変換が完了しました';
                        errorEl.style.display = 'block';

                        if (currentActiveHistoryId) {
                            saveConvertedPlayerIdToHistory(currentActiveHistoryId, playerIdHex);
                        }
                    });

                    // Workerを終了
                    rsidWorker.terminate();
                    rsidWorker = null;
                }
            };

            rsidWorker.onerror = (error) => {
                console.error('Worker error:', error);
                requestAnimationFrame(() => {
                    spinner.style.display = 'none';
                    convertBtn.disabled = false;
                    progressContainer.style.display = 'none';
                    errorEl.style.color = '#f96666'; // エラー色
                    errorEl.textContent = "エラー：変換処理中に予期しない問題が発生しました。";
                    errorEl.style.display = 'block';
                });
                rsidWorker.terminate();
                rsidWorker = null;
            };

            // Workerにデータを送信して変換開始
            rsidWorker.postMessage({
                type: 'convert',
                leafNodes: leafNodesToConvert,
                playerIdHex: playerIdHex
            });
        });

        // --- プレイヤーID記憶 & 複数登録 ---
        // =============================================================        // --- プレイヤーID登録 (localStorage) ---
        const PLAYER_IDS_KEY = 'savedPlayerIds';
        const LAST_USED_ID_KEY = 'lastUsedPlayerId';

        function getSavedPlayerIds() {
            try {
                const raw = localStorage.getItem(PLAYER_IDS_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }

        function renderPlayerIdDropdown() {
            const select = document.getElementById('player-id-select');
            const ids = getSavedPlayerIds();
            // 既存のオプションを初期化（最初の手動入力オプション以外）
            while (select.options.length > 1) {
                select.remove(1);
            }
            ids.forEach(entry => {
                const opt = document.createElement('option');
                opt.value = entry.id;
                opt.textContent = `${entry.name}: ${entry.id}`;
                select.appendChild(opt);
            });
        }

        // ドロップダウン変更時
        document.getElementById('player-id-select').addEventListener('change', (e) => {
            const val = e.target.value;
            if (val) {
                document.getElementById('player-id-input').value = val;
                document.getElementById('pid-del-btn').style.display = 'block';
            } else {
                document.getElementById('pid-del-btn').style.display = 'none';
            }
            localStorage.setItem(LAST_USED_ID_KEY, val);
        });

        // 手動入力時も保存
        document.getElementById('player-id-input').addEventListener('input', (e) => {
            localStorage.setItem(LAST_USED_ID_KEY, e.target.value);
            document.getElementById('player-id-select').value = '';
            document.getElementById('pid-del-btn').style.display = 'none';
        });

        // 削除ボタン
        document.getElementById('pid-del-btn').addEventListener('click', () => {
            const select = document.getElementById('player-id-select');
            const idToDelete = select.value;
            if (!idToDelete) return;
            if (!confirm(`登録済みのプレイヤーID「${idToDelete}」を削除しますか？`)) return;

            let ids = getSavedPlayerIds();
            ids = ids.filter(e => e.id !== idToDelete);
            localStorage.setItem(PLAYER_IDS_KEY, JSON.stringify(ids));

            renderPlayerIdDropdown();
            document.getElementById('player-id-input').value = '';
            document.getElementById('pid-del-btn').style.display = 'none';
            localStorage.removeItem(LAST_USED_ID_KEY);
        });

        // 登録ボタン
        document.getElementById('pid-add-btn').addEventListener('click', () => {
            const name = document.getElementById('pid-name-input').value.trim();
            const id = document.getElementById('pid-id-input').value.trim();
            if (!name || !id) {
                alert('名前とIDの両方を入力してください。');
                return;
            }
            if (id.length > 6) {
                alert('IDは6文字以内で入力してください。');
                return;
            }
            const ids = getSavedPlayerIds();
            // 重複チェック
            if (ids.some(e => e.id === id)) {
                alert('このIDは既に登録されています。');
                return;
            }
            ids.push({ name, id });
            localStorage.setItem(PLAYER_IDS_KEY, JSON.stringify(ids));
            renderPlayerIdDropdown();
            // フォームクリア
            document.getElementById('pid-name-input').value = '';
            document.getElementById('pid-id-input').value = '';
            // 追加したIDを自動選択
            document.getElementById('player-id-select').value = id;
            document.getElementById('player-id-input').value = id;
            document.getElementById('pid-del-btn').style.display = 'block';
            document.getElementById('player-id-manage-row').style.display = 'none';
            localStorage.setItem(LAST_USED_ID_KEY, id);
        });

        // ID登録フォームの表示切替
        document.getElementById('show-register-btn').addEventListener('click', () => {
            const row = document.getElementById('player-id-manage-row');
            row.style.display = row.style.display === 'none' ? 'flex' : 'none';
        });

        // 初期描画
        renderPlayerIdDropdown();

        // 前回使用したIDの復元
        const lastUsedId = localStorage.getItem(LAST_USED_ID_KEY);
        if (lastUsedId) {
            document.getElementById('player-id-input').value = lastUsedId;
            const select = document.getElementById('player-id-select');
            let optionExists = false;
            for (let i = 0; i < select.options.length; i++) {
                if (select.options[i].value === lastUsedId) {
                    optionExists = true;
                    break;
                }
            }
            if (optionExists) {
                select.value = lastUsedId;
                document.getElementById('pid-del-btn').style.display = 'block';
            }
        }

        // =============================================================
        // --- 履歴・プレイヤーIDのJSON形式エクスポート / インポート ---
        // =============================================================
        document.getElementById('history-export-btn').addEventListener('click', () => {
            const history = getHistory();
            const playerIds = getSavedPlayerIds();
            if (history.length === 0 && playerIds.length === 0) {
                alert('エクスポートするデータがありません。');
                return;
            }
            const exportData = {
                history: history,
                playerIds: playerIds
            };
            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            const dateStr = `${now.getFullYear()}${(now.getMonth() + 1).toString().padStart(2, '0')}${now.getDate().toString().padStart(2, '0')}`;
            a.download = `kakeizu_data_${dateStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('history-import-btn').addEventListener('click', () => {
            document.getElementById('history-import-file').click();
        });

        document.getElementById('history-import-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    let importedHistory = [];
                    let importedPlayerIds = [];

                    if (Array.isArray(imported)) {
                        // 旧バージョンの履歴データフォーマット
                        importedHistory = imported;
                    } else if (imported && typeof imported === 'object') {
                        // 新フォーマット { history: [...], playerIds: [...] }
                        if (imported.history) importedHistory = imported.history;
                        if (imported.playerIds) importedPlayerIds = imported.playerIds;
                    } else {
                        throw new Error('無効なフォーマット');
                    }

                    // バリデーション - 履歴
                    for (const entry of importedHistory) {
                        if (!entry.id || !entry.name || typeof entry.data !== 'string') {
                            throw new Error('無効な履歴エントリが含まれています');
                        }
                    }

                    // バリデーション - プレイヤーID
                    for (const entry of importedPlayerIds) {
                        if (!entry.id || !entry.name) {
                            throw new Error('無効なプレイヤーIDエントリが含まれています');
                        }
                    }

                    // --- プレイヤーIDのマージ ---
                    const existingPids = getSavedPlayerIds();
                    const existingPidSet = new Set(existingPids.map(p => p.id));
                    let pidAddedCount = 0;
                    for (const entry of importedPlayerIds) {
                        if (!existingPidSet.has(entry.id)) {
                            existingPids.push(entry);
                            pidAddedCount++;
                        }
                    }
                    if (pidAddedCount > 0) {
                        localStorage.setItem(PLAYER_IDS_KEY, JSON.stringify(existingPids));
                        renderPlayerIdDropdown();
                    }

                    // --- 履歴のマージ ---
                    const existingHistory = getHistory();
                    const existingHids = new Set(existingHistory.map(h => h.id));

                    let historyAddedCount = 0;
                    for (const entry of importedHistory) {
                        if (!existingHids.has(entry.id)) {
                            existingHistory.push(entry);
                            historyAddedCount++;
                        }
                    }

                    // 最大件数制限
                    if (existingHistory.length > MAX_HISTORY) {
                        existingHistory.splice(MAX_HISTORY);
                    }

                    localStorage.setItem(HISTORY_KEY, JSON.stringify(existingHistory));
                    renderHistoryList();

                    let msg = 'インポート完了:';
                    if (historyAddedCount > 0) msg += `\n・履歴を ${historyAddedCount} 件追加`;
                    if (pidAddedCount > 0) msg += `\n・プレイヤーIDを ${pidAddedCount} 件追加`;
                    if (historyAddedCount === 0 && pidAddedCount === 0) msg += '\n・新しい追加データはありませんでした（重複をスキップ）';
                    alert(msg);
                } catch (err) {
                    alert('インポートに失敗しました: ' + err.message);
                }
            };
            reader.readAsText(file);
            // ファイル入力をリセット（同じファイルを再選択可能にする）
            e.target.value = '';
        });


    </script>
</body>
