<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家系図ジェネレーター(顔プレビュー付き)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a2e;
            --container-bg: #2c2c3e;
            --card-bg: #3a3a50;
            --primary-accent: #7f5af0;
            --champion-accent: #ffc639;
            --text-color: #e0e0e0;
            --text-muted: #9a9a9a;
            --line-color: #3ce4c8;
            --line-offset-y: 240px;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            box-sizing: border-box;
            gap: 15px;
        }

        /* --- 履歴サイドバー --- */
        .history-sidebar {
            width: 260px;
            min-width: 260px;
            max-height: calc(100vh - 30px);
            background: var(--container-bg);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: sticky;
            top: 15px;
        }

        .history-header {
            padding: 16px 20px;
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .history-header span {
            opacity: 0.6;
            font-size: 12px;
            font-weight: 400;
        }

        .history-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.15s ease;
            gap: 10px;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background-color: rgba(127, 90, 240, 0.15);
            border-color: rgba(127, 90, 240, 0.3);
        }

        .history-item.active {
            background-color: rgba(127, 90, 240, 0.25);
            border-color: var(--primary-accent);
        }

        .history-item-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary-accent), #a85af0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .history-item-info {
            flex-grow: 1;
            overflow: hidden;
        }

        .history-item-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-date {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .history-item-delete {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.2s ease, background-color 0.2s ease, color 0.2s ease;
        }

        .history-item:hover .history-item-delete {
            opacity: 1;
        }

        .history-item-delete:hover {
            background-color: rgba(249, 102, 102, 0.2);
            color: #f96666;
        }

        /* --- 新規作成アイテム (+ボタン) --- */
        .history-new-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            gap: 10px;
            border: 1px dashed rgba(60, 228, 200, 0.5);
            background-color: rgba(60, 228, 200, 0.05);
            justify-content: center;
            color: #3ce4c8;
            font-weight: 600;
            font-size: 14px;
        }

        .history-new-item:hover {
            background-color: rgba(60, 228, 200, 0.15);
            border-color: #3ce4c8;
        }

        .history-new-item-icon {
            font-size: 18px;
            line-height: 1;
        }

        .history-empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            padding: 30px 15px;
            line-height: 1.6;
        }

        .history-clear-btn {
            padding: 4px 10px;
            font-size: 11px;
            background: rgba(249, 102, 102, 0.2);
            color: #f96666;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .history-clear-btn:hover {
            background: rgba(249, 102, 102, 0.4);
            transform: none;
        }

        .container {
            flex-grow: 1;
            min-width: 0;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 25px;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #5a4a9c;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            background-color: var(--card-bg);
            color: var(--text-color);
            resize: none;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-accent);
            box-shadow: 0 0 10px rgba(127, 90, 240, 0.5);
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            color: #fff;
            font-size: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        #generate-btn {
            background: linear-gradient(90deg, #7f5af0, #a85af0);
            box-shadow: 0 4px 15px rgba(127, 90, 240, 0.3);
        }

        #generate-btn:hover {
            box-shadow: 0 6px 20px rgba(127, 90, 240, 0.5);
        }

        #save-btn {
            background: linear-gradient(90deg, #3ca1c3, #3ce4c8);
            box-shadow: 0 4px 15px rgba(60, 228, 200, 0.2);
        }

        #clear-btn {
            background: linear-gradient(90deg, #4b4b63, #626288);
            box-shadow: 0 4px 15px rgba(98, 98, 136, 0.2);
        }

        #collapse-all-btn {
            background: linear-gradient(90deg, #f08a5a, #f96666);
            box-shadow: 0 4px 15px rgba(240, 138, 90, 0.2);
        }

        #paste-btn {
            background: linear-gradient(90deg, #10b981, #059669);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        #webhook-share-btn {
            background: linear-gradient(90deg, #5865F2, #7289da);
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.2);
        }

        #history-export-btn {
            background: linear-gradient(90deg, #8b5cf6, #7c3aed);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }

        #history-import-btn {
            background: linear-gradient(90deg, #ec4899, #db2777);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.2);
        }

        .bracket-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin-top: 40px;
            overflow-x: auto;
            padding: 20px;
            background-color: var(--container-bg);
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }

        .round {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            margin-top: var(--line-offset-y);
            width: 100%;
        }

        .round:first-child {
            margin-top: 0;
        }

        .player-card {
            border: 2px solid var(--primary-accent);
            background-color: var(--card-bg);
            padding: 12px;
            margin: 0 40px;
            border-radius: 8px;
            text-align: center;
            width: 220px;
            color: var(--text-color);
            word-wrap: break-word;
            box-sizing: border-box;
            flex-shrink: 0;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, opacity 0.3s ease;
            box-shadow: 0 0 8px rgba(127, 90, 240, 0.3);
            position: relative;
        }

        .player-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(127, 90, 240, 0.5);
        }

        .round.is-dense,
        .round.is-crowded,
        .round.is-super-crowded {
            justify-content: space-around;
        }

        .round.is-dense .player-card {
            width: auto;
            flex-shrink: 1;
            flex-grow: 1;
            flex-basis: 0;
            min-width: 140px;
            max-width: 200px;
            margin: 0 15px;
            padding: 10px;
            font-size: 0.95em;
        }

        .round.is-crowded .player-card {
            width: auto;
            flex-shrink: 1;
            flex-grow: 1;
            flex-basis: 0;
            min-width: 100px;
            max-width: 180px;
            margin: 0 5px;
            padding: 8px;
            font-size: 0.9em;
        }

        .round.is-super-crowded {
            margin-top: calc(var(--line-offset-y) + 80px);
        }

        .round.is-super-crowded .player-card {
            width: auto;
            flex-shrink: 1;
            flex-grow: 1;
            flex-basis: 0;
            min-width: 75px;
            max-width: 120px;
            margin: 0 2px;
            padding: 5px;
            font-size: 0.8em;
        }

        .player-card .name {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
        }

        .champion-card {
            border-color: var(--champion-accent);
            box-shadow: 0 0 15px rgba(255, 198, 57, 0.4);
            width: fit-content;
            min-width: 220px;
            max-width: 400px;
        }

        .champion-card:hover {
            box-shadow: 0 8px 30px rgba(255, 198, 57, 0.6);
        }

        .champion-card .status {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--text-muted);
            font-size: 15px;
            text-align: left;
            white-space: pre-wrap;
            color: var(--text-color);
        }

        .relation-info {
            font-size: 0.9em;
            color: var(--text-muted);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #555;
            text-align: left;
            line-height: 1.5;
        }

        .relation-info div {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 190px;
        }

        .round.is-dense .relation-info div {
            max-width: 180px;
        }

        .round.is-crowded .relation-info div {
            max-width: 150px;
        }

        .round.is-super-crowded .relation-info div {
            max-width: 100px;
        }

        .collapsible {
            cursor: pointer;
        }

        .collapsible:not(.highlight-focus):hover {
            outline: 2px solid var(--line-color);
            outline-offset: 2px;
        }

        .collapsed {
            display: none !important;
        }

        .player-card.pair-first {
            border-color: #f96666 !important;
            /* ペアの先 (赤) */
        }

        .player-card.pair-second {
            border-color: #66a9f9 !important;
            /* ペアの後 (青) */
        }

        .player-card.champion-card {
            border-color: var(--champion-accent) !important;
        }

        #bracket-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #bracket-lines path {
            stroke: var(--line-color);
            stroke-width: 1.5px;
            stroke-opacity: 0.45;
            fill: none;
            transition: stroke-width 0.3s ease, stroke-opacity 0.3s ease;
        }

        /* --- 接続線の先(赤)/後(青)カラー --- */
        #bracket-lines path.line-red {
            stroke: #f96666;
        }

        #bracket-lines path.line-blue {
            stroke: #66a9f9;
        }

        .bracket-container.highlight-active .player-card {
            opacity: 0.2;
        }

        .bracket-container.highlight-active .player-card.highlight-focus {
            opacity: 1;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.4);
        }

        .bracket-container.highlight-active #bracket-lines path.highlight-focus {
            stroke-opacity: 1;
            stroke-width: 3px;
            filter: drop-shadow(0 0 3px var(--line-color));
        }


        .screenshot-mode h1,
        .screenshot-mode textarea:focus,
        .screenshot-mode #generate-btn,
        .screenshot-mode .player-card {
            text-shadow: none !important;
            box-shadow: none !important;
            opacity: 1 !important;
        }

        .screenshot-mode .player-card.pair-first,
        .screenshot-mode .player-card.pair-second {
            border-color: var(--primary-accent) !important;
        }

        .screenshot-mode .player-card.champion-card {
            border-color: var(--champion-accent) !important;
        }

        .screenshot-mode #bracket-lines path {
            filter: none !important;
            stroke-opacity: 1 !important;
            stroke-width: 2.5px !important;
        }

        .face-preview-container {
            width: 200px;
            height: 200px;
            position: relative;
            background-color: transparent;
            margin: 0 auto 10px auto;
            border-radius: 16px;
            overflow: hidden;
        }

        .face-preview-container .part-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .preview-kami-rinkaku {
            z-index: 2;
            transform: scale(1) translate(0px, 0px) rotate(0deg);
        }

        .preview-hoo {
            z-index: 3;
            transform: scale(0.7) translate(5px, 45px) rotate(0deg);
        }

        .preview-me {
            z-index: 4;
            transform: scale(0.65) translate(3px, 0px) rotate(0deg);
        }

        .preview-mayu {
            z-index: 5;
            transform: scale(0.55) translate(0px, -57px) rotate(0deg);
        }

        .preview-hana {
            z-index: 6;
            transform: scale(0.3) translate(-10px, 60px) rotate(0deg);
        }

        .preview-kuchi {
            z-index: 7;
            transform: scale(0.6) translate(5px, 75px) rotate(0deg);
        }

        .color-info-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            margin-bottom: 12px;
        }

        .color-info-item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            color: var(--text-color);
        }

        .color-preview-box {
            width: 22px;
            height: 22px;
            border: 1px solid var(--text-muted);
            border-radius: 4px;
            margin-left: 8px;
            background-size: cover;
            background-position: center;
        }

        .custom-color-palette {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            padding-top: 5px;
        }

        .palette-item {
            display: flex;
            align-items: center;
            font-size: 0.9em;
        }

        .palette-color-box {
            width: 18px;
            height: 18px;
            border: 1px solid var(--text-muted);
            border-radius: 3px;
            margin-right: 5px;
        }

        .pattern-rank {
            background-color: var(--bg-color);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--primary-accent);
            font-weight: bold;
            color: var(--text-color);
        }

        .qr-code {
            width: 160px;
            height: 160px;
            margin: 10px auto 0;
            background-color: #ffffff;
            border-radius: 4px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            cursor: pointer;
        }

        .round.is-dense .qr-code {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            max-width: 140px;
        }

        .round.is-crowded .qr-code {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            max-width: 120px;
        }

        .round.is-super-crowded .qr-code {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            max-width: 90px;
        }

        .round.is-dense .qr-code>*,
        .round.is-crowded .qr-code>*,
        .round.is-super-crowded .qr-code>* {
            width: 100% !important;
            height: 100% !important;
        }

        .rsid-text {
            color: #ccc;
            font-size: 14px;
            font-family: monospace;
            margin-top: 8px;
            word-break: break-all;
        }

        #error-message {
            color: #f96666;
            text-align: center;
            margin-top: 15px;
            display: none;
            font-weight: 700;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        #modal-content {
            position: relative;
        }

        #modal-inner-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* --- モーダル内の個体名表示 --- */
        .modal-name {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
            max-width: 450px;
            word-break: break-all;
        }

        /* --- モーダル内のカウンター表示 --- */
        .modal-counter {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
        }

        /* --- モーダルナビゲーションボタン --- */
        .modal-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            font-size: 32px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, transform 0.2s ease;
            z-index: 1001;
            padding: 0;
            line-height: 1;
        }

        .modal-nav-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-50%) scale(1.1);
        }

        .modal-nav-prev {
            left: 30px;
        }

        .modal-nav-next {
            right: 30px;
        }

        #close-modal {
            position: absolute;
            top: -15px;
            right: -15px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        #close-modal:hover {
            color: #bbb;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* --- プログレスバー --- */
        #progress-container {
            display: none;
            margin-top: 10px;
            padding: 0;
        }

        #progress-bar-wrapper {
            width: 100%;
            height: 24px;
            background-color: var(--bg-color);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #10b981, #3ce4c8, #7f5af0);
            background-size: 200% 100%;
            border-radius: 12px;
            transition: width 0.3s ease;
            animation: progressShimmer 2s ease infinite;
        }

        @keyframes progressShimmer {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        #progress-text {
            display: block;
            text-align: center;
            margin-top: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* --- Webhookボタン --- */
        #webhook-share-btn {
            background: linear-gradient(90deg, #5865F2, #7289DA);
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        #webhook-share-btn:hover {
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.5);
        }

        /* --- Webhook設定エリア --- */
        .webhook-settings {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(88, 101, 242, 0.3);
        }

        .webhook-settings label {
            font-weight: 700;
            white-space: nowrap;
            color: #7289DA;
        }

        .webhook-settings input {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #5865F2;
            background: var(--bg-color);
            color: var(--text-color);

        #webhook-save-btn {

            font-size: 14px;
            white-space: nowrap;
        }

        #webhook-status {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* --- テキストエリアコンテナ（貼り付けボタン用） --- */
        .textarea-container {
            position: relative;
        }

        .paste-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(127, 90, 240, 0.25);
            color: var(--text-color);
            border: 1px solid rgba(127, 90, 240, 0.4);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
            z-index: 10;
        }

        .paste-btn:hover {
            background: rgba(127, 90, 240, 0.45);
            transform: translateY(-1px);

        /* --- プレイヤーID管理エリア --- */
        .player-id-area {
            margin-top: 20px;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
        }

        .player-id-row {
            display: flex;
            gap: 10px;
            align-items: center;

        .player-id-row label {
            font-weight: 700;
        }

        .player-id-row input[type="text"] {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--primary-accent);
            background: var(--bg-color);
            color: var(--text-color);
            flex-grow: 1;
        }

        .player-id-select {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--primary-accent);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
            min-width: 140px;
        }

        .player-id-manage-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            align-items: center;
        }

        .player-id-manage-row input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.15);

        }

        .pid-add-btn,
        .pid-del-btn {
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            color: #fff;
            white-space: nowrap;
        }

        .pid-add-btn {
            background: linear-gradient(90deg, #10b981, #3ce4c8);
        }

        .pid-del-btn {
            background: rgba(249, 102, 102, 0.3);
            color: #f96666;
        }

        .pid-del-btn:hover {
            background: rgba(249, 102, 102, 0.5);
        }

        /* --- 履歴エクスポート/インポート --- */
        .history-actions {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }

        .history-actions button {
            flex: 1;
            padding: 8px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .history-actions button:hover {
            background: rgba(127, 90, 240, 0.2);
            color: var(--text-color);
            transform: none;
        }

        /* --- ドラッグ＆ドロップ --- */
        .history-item.dragging {
            opacity: 0.4;
        }

        .history-item.drag-over {
            border-top: 2px solid var(--primary-accent);
        }

        .drag-handle {
            cursor: grab;
            color: var(--text-muted);
            font-size: 12px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.2s;
            user-select: none;
        }

        .history-item:hover .drag-handle {
            opacity: 0.6;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        /* --- テーマ切替トグル --- */
        .theme-toggle {
            position: relative;
            width: 48px;
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            cursor: pointer;
            border: none;
            padding: 0;
            transition: background 0.3s;
            flex-shrink: 0;
        }

        .theme-toggle::after {
            content: '🌙';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-accent);
            transition: transform 0.3s, content 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        [data-theme="light"] .theme-toggle {
            background: rgba(0, 0, 0, 0.15);
        }

        [data-theme="light"] .theme-toggle::after {
            content: '☀️';
            transform: translateX(24px);
            background: #f59e0b;
        }

        /* --- ライトモード --- */
        [data-theme="light"] {
            --bg-color: #eef1f5;
            --container-bg: #ffffff;
            --card-bg: #f4f5f7;
            --primary-accent: #6c47d9;
            --champion-accent: #d4a017;
            --text-color: #1e1e2e;
            --text-muted: #6b7280;
            --line-color: #0d9488;
        }

        [data-theme="light"] body {
            background-color: var(--bg-color);
        }

        [data-theme="light"] h1 {
            color: var(--text-color);
            text-shadow: none;
        }

        [data-theme="light"] textarea {
            border-color: #c4b5fd;
        }

        [data-theme="light"] .history-sidebar {
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        [data-theme="light"] .container {
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        [data-theme="light"] .player-card {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        [data-theme="light"] .rsid-text {
            color: #555;
        }

        /* --- QRぼかし（モーダル表示時） --- */
        .qr-blur-active .qr-code {
            filter: blur(8px);
            pointer-events: none;
            transition: filter 0.3s ease;
        }

        /* --- 出生完了ラベル --- */
        .birth-complete-label {
            color: #89c3eb;
            font-size: 0.75em;
            margin-left: 6px;
            font-weight: 400;
            opacity: 0.85;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div class="history-sidebar">
        <div class="history-header">
            📋 履歴
            <button class="history-clear-btn" id="history-clear-btn">全削除</button>
        </div>
        <div class="history-list" id="history-list">

        </div>

    <div class="container">

            <h1 style="flex-grow: 1;">家系図ジェネレーター(顔プレビュー付き)</h1>
            <button class="theme-toggle" id="theme-toggle" title="テーマ切替"></button>

            <button id="generate-btn"><span
                    style="color: #ffeb3b; margin-right: 4px; text-shadow: 0 0 8px rgba(255,235,59,0.6);">②</span>家系図を生成</button>
            <button id="clear-btn">削除</button>

                <!-- 左に大きく配置する変換ボタン -->

                    <span
                        style="color: #ffeb3b; margin-right: 4px; text-shadow: 0 0 8px rgba(255,235,59,0.6);">③</span>プレイヤーIDを用いて変換
                </button>
                <div id="spinner" class="loading-spinner" style="display: none; align-self: center;"></div>

                <!-- 右側の入力・セレクトエリア -->
                <div
                    style="display: flex; flex-direction: column; gap: 10px; margin-left: 150px; justify-content: center; flex-grow: 1;">
                    <div class="player-id-row"
                        style="margin: 0; display: flex; gap: 10px; align-items: center; width: 100%;">
                        <label for="player-id-input"
                            style="white-space: nowrap; width: auto; min-width: 100px; flex-shrink: 0;">プレイヤーID:</label>
                        <select class="player-id-select" id="player-id-select"
                            style="width: 200px; min-width: 200px; flex-shrink: 0;">
                            <option value="">-- 手動入力 --</option>
                        </select>
                        <input type="text" id="player-id-input" placeholder="例: cc0db7" maxlength="6"
                            style="flex-grow: 1; min-width: 100px;">
                    </div>

                    <!-- プルダウンの下に配置する登録ボタンとフォーム -->
                    <div style="display: flex; gap: 15px; align-items: center; margin-left: 110px;">
                        <div style="display: flex; gap: 8px; width: 200px; flex-shrink: 0;">
                            <button id="show-register-btn"
                                style="background: rgba(127, 90, 240, 0.2); border: 1px solid rgba(127, 90, 240, 0.5); color: var(--text-color); padding: 6px 0; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: background 0.2s; flex: 1; text-align: center;">

                            </button>
                            <button id="pid-del-btn"
                                style="background: rgba(220, 53, 69, 0.15); border: 1px solid rgba(220, 53, 69, 0.4); color: #ff6b6b; padding: 6px 0; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: background 0.2s; display: none; flex: 1; text-align: center;">削除</button>
                        </div>

                        <div class="player-id-manage-row" id="player-id-manage-row" style="display: none; margin: 0;">
                            <input type="text" id="pid-name-input" placeholder="名前 (例: 自分)" style="width: 120px;">
                            <input type="text" id="pid-id-input" placeholder="ID (例: cc0db7)" maxlength="6"
                                style="width: 100px;">

        <div class="webhook-settings" style="margin-top: 80px;">

        </div>
        <div class="button-group" style="margin-top: 15px;">
            <button id="save-btn">画像として保存</button>
            <button id="webhook-share-btn">Webhookで共有</button>
            <button id="history-export-btn">jsonでエクスポート</button>
            <button id="history-import-btn">jsonでインポート</button>
        </div>
        <p id="error-message"></p>
        <div class="bracket-container" id="bracket-container">

        </div>

    <div id="modal-overlay" class="modal-overlay">
        <span id="close-modal">&times;</span>
        <button id="modal-prev" class="modal-nav-btn modal-nav-prev" title="前へ">&#10094;</button>
        <div id="modal-inner-wrapper">
            <div id="modal-name" class="modal-name"></div>
            <div id="modal-content"></div>
            <div id="modal-counter" class="modal-counter"></div>
        </div>
        <button id="modal-next" class="modal-nav-btn modal-nav-next" title="次へ">&#10095;</button>
    </div>

    <script>
        // --- 履歴管理 (localStorage) ---
        const HISTORY_KEY = 'rsidHistory';
        const MAX_HISTORY = 50; // 最大保存件数

        let currentActiveHistoryId = null;

        /**
         * localStorageから履歴配列を取得する
         * @returns {Array<{id: string, name: string, data: string, date: string}>}
         */
        function getHistory() {
            try {
                const raw = localStorage.getItem(HISTORY_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }

        /**
         * 履歴をlocalStorageに保存（または更新）する
         * @param {string} championName - チャンピオン名
         * @param {string} rsidData - RSIDテキストデータ
         */
        function saveToHistory(championName, rsidData) {
            const history = getHistory();
            const now = new Date();
            const dateStr = `${now.getFullYear()}/${(now.getMonth() + 1).toString().padStart(2, '0')}/${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            // すでにアクティブな履歴がある場合はそれを更新
            let existingIndex = -1;
            if (currentActiveHistoryId) {
                existingIndex = history.findIndex(h => h.id === currentActiveHistoryId);
            }

            if (existingIndex !== -1) {
                // 既存の履歴を更新
                history[existingIndex].name = championName || history[existingIndex].name;
                if (history[existingIndex].data !== rsidData) {
                    history[existingIndex].data = rsidData;
                    delete history[existingIndex].convertedPlayerId;
                }
                history[existingIndex].date = dateStr; // 更新日時を更新
                history[existingIndex].image = null; // 画像は保存しない
            } else {
                // 新規作成
                const entry = {
                    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                    name: championName,
                    data: rsidData,
                    date: dateStr,
                    image: null
                };
                currentActiveHistoryId = entry.id; // アクティブにする
                history.unshift(entry);
            }

            // 最大件数を超えたら古いものを削除
            if (history.length > MAX_HISTORY) {
                history.splice(MAX_HISTORY);
            }

            try {
                localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            } catch (e) {
                console.error('履歴の保存に失敗しました(容量不足など):', e);
                alert('ブラウザの容量不足のため、履歴を保存できませんでした。不要な履歴を削除してください。');
            }
            renderHistoryList();
        }

        /**
         * 指定IDの履歴を削除する
         * @param {string} entryId
         */
        function deleteHistoryEntry(entryId) {
            let history = getHistory();
            history = history.filter(h => h.id !== entryId);
            if (currentActiveHistoryId === entryId) {
                currentActiveHistoryId = null;
            }
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistoryList();
        }

        /**
         * 全履歴を削除する
         */
        function clearAllHistory() {
            localStorage.removeItem(HISTORY_KEY);
            renderHistoryList();
        }

        /**
         * 履歴項目を選択してRSIDをテキストエリアに読み込む
         * @param {string} entryId
         */
        function saveConvertedPlayerIdToHistory(entryId, playerIdHex) {
            const history = getHistory();
            const existingIndex = history.findIndex(h => h.id === entryId);
            if (existingIndex !== -1) {
                history[existingIndex].convertedPlayerId = playerIdHex;
                localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            }
        }

        function restoreConversionState(playerIdHex) {
            const errorEl = document.getElementById('error-message');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const convertBtn = document.getElementById('convert-rsid-btn');
            const spinner = document.getElementById('spinner');

            // プレイヤーIDの入力と選択状態を更新
            document.getElementById('player-id-input').value = playerIdHex;
            const select = document.getElementById('player-id-select');
            let optionExists = false;
            for (let i = 0; i < select.options.length; i++) {
                if (select.options[i].value === playerIdHex) {
                    select.value = playerIdHex;
                    optionExists = true;
                    break;
                }
            }
            if (optionExists) {
                document.getElementById('pid-del-btn').style.display = 'block';
            } else {
                select.value = '';
                document.getElementById('pid-del-btn').style.display = 'none';
            }

            // キャッシュから変換データを取得して適用
            const RSID_CACHE_KEY = 'rsidConversionCache';
            let cache = {};
            try {
                const rawCache = localStorage.getItem(RSID_CACHE_KEY);
                if (rawCache) cache = JSON.parse(rawCache);
            } catch (e) { }

            const convertedResults = [];
            for (const round of currentRoundsData) {
                for (const node of round) {
                    if (!node.participants || node.participants.length === 0) {
                        const rsidForConversion = node.originalId || node.id;
                        if (!rsidForConversion) continue;

                        const cacheKey = `${playerIdHex}_${rsidForConversion}`;
                        if (cache[cacheKey]) {
                            convertedResults.push({ uniqueId: node.uniqueId, newId: cache[cacheKey], id: rsidForConversion });
                        }
                    }
                }
            }

            if (convertedResults.length > 0) {
                // 結果を反映
                for (const result of convertedResults) {
                    if (result.newId) {
                        const cardEl = document.getElementById(result.uniqueId);
                        if (cardEl) {
                            const rsidTextEl = cardEl.querySelector('.rsid-text');
                            if (rsidTextEl) {
                                rsidTextEl.textContent = result.newId;
                            }
                            const qrEl = cardEl.querySelector('.qr-code');
                            if (qrEl) {
                                qrEl.innerHTML = '';
                                qrEl.dataset.id = result.newId;
                                const alphanumericOnlyId = result.newId.replace(/[^a-zA-Z0-9]/g, '');
                                new QRCode(qrEl, {
                                    text: alphanumericOnlyId,
                                    width: 150,
                                    height: 150
                                });
                            }
                        }
                    }
                }

                // UI表示を完了状態にする
                progressContainer.style.display = 'block';
                progressBar.style.width = '100%';
                progressText.textContent = '変換完了';
                spinner.style.display = 'none';
                convertBtn.disabled = false;
                errorEl.style.color = '#3ce4c8';
                errorEl.textContent = '全QRコードの変換が完了しました';
                errorEl.style.display = 'block';
            }
        }

        // 履歴読み込み中フラグ（重複保存防止）
        let isLoadingFromHistory = false;

        function loadHistoryEntry(entryId) {
            const history = getHistory();
            const entry = history.find(h => h.id === entryId);
            if (!entry) return;

            // 変換UIの状態を完全にリセット（前の家系図の変換状態を引き継がない）
            resetConversionUI();

            currentActiveHistoryId = entryId;

            // テキストエリアに反映
            const textarea = document.getElementById('rsid-input');
            textarea.value = entry.data || "";
            textarea.style.height = 'auto';
            textarea.style.height = `${textarea.scrollHeight}px`;

            // フラグを立てて自動生成（再保存を防止）
            isLoadingFromHistory = true;
            if (entry.data) {
                document.getElementById('generate-btn').click();

                // 折り畳み状態を復元
                if (entry.collapsedNodes && entry.collapsedNodes.length > 0) {
                    entry.collapsedNodes.forEach(nodeId => {
                        const el = document.getElementById(nodeId);
                        if (el) {
                            el.dataset.collapsed = 'true';
                            addBirthCompleteLabel(el);
                        }
                    });
                    updateAllVisibility(nodesMap);
                }

                // 以前に変換完了していた場合、自動的にキャッシュから変換を適用してUIを維持する
                if (entry.convertedPlayerId) {
                    restoreConversionState(entry.convertedPlayerId);
                }
            } else {
                // データが空ならクリアのみ
                document.getElementById('clear-btn').click();
            }
            renderHistoryList(); // activeクラスをつけるため
        }

        /**
         * サイドバーの履歴リストを再描画する
         */
        function renderHistoryList() {
            const listEl = document.getElementById('history-list');
            const emptyEl = document.getElementById('history-empty');
            const history = getHistory();

            // 既存の項目をクリア（empty要素は保持）
            listEl.querySelectorAll('.history-item').forEach(el => el.remove());

            if (history.length === 0) {
                if (emptyEl) emptyEl.style.display = 'block';
                return;
            }

            if (emptyEl) emptyEl.style.display = 'none';

            let dragSrcEl = null;

            history.forEach((entry, idx) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.dataset.id = entry.id;
                item.dataset.index = idx;
                item.draggable = true;

                if (entry.id === currentActiveHistoryId) {
                    item.classList.add('active');
                }

                item.innerHTML = `
                <span class="drag-handle">☰</span>
                <div class="history-item-info">
                    <div class="history-item-name" title="${entry.name}">${entry.name}</div>
                    <div class="history-item-date">${entry.date}</div>
                </div>

        function parseNode(str) {
            str = str.trim();
            if (!str.startsWith("(")) {
                const parts = str.split(/\s+/);
                let id = parts.shift();
                let name = parts.join(" ");
                if (!name) {
                    name = id;
                    id = "";
                }
                return { id, name, participants: [] };
            }
            let balance = 0, end = -1;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === "(") balance++;
                else if (str[i] === ")") balance--;
                if (balance === 0) { end = i; break; }
            }
            if (end === -1) throw new Error("括弧の対応が正しくありません。");
            const winner = str.substring(end + 1).trim();
            const inside = str.substring(1, end).trim();
            let depth = 0, split = -1;
            for (let i = 0; i < inside.length; i++) {
                if (inside[i] === "(") depth++;
                else if (inside[i] === ")") depth--;
                else if (inside[i] === "+" && depth === 0) { split = i; break; }
            }
            if (split === -1) throw new Error("'+' 区切りが見つかりません。");
            const left = inside.substring(0, split).trim();
            const right = inside.substring(split + 1).trim();
            return { name: winner, participants: [parseNode(left), parseNode(right)], id: null };
        }

        function drawLines(rounds) {
            if (!rounds || rounds.length === 0) return;
            const container = document.getElementById('bracket-container');
            const svg = document.getElementById('bracket-lines');
            svg.innerHTML = '';
            svg.setAttribute('width', container.scrollWidth);
            svg.setAttribute('height', container.scrollHeight);

            function getElementPosition(id) {
                const el = document.getElementById(id);
                if (!el || el.classList.contains('collapsed')) return null;
                const containerRect = container.getBoundingClientRect();
                const elRect = el.getBoundingClientRect();
                return {
                    id: id,
                    cx: elRect.left - containerRect.left + container.scrollLeft + elRect.width / 2,
                    top: elRect.top - containerRect.top + container.scrollTop,
                    bottom: elRect.top - containerRect.top + container.scrollTop + elRect.height,
                };
            }

            function connectCards(fromIds, toId, delay, pairIndex = 0, totalPairsInRound = 1) {
                const toPos = getElementPosition(toId);
                if (!toPos) return;

                const fromPositions = fromIds.map(getElementPosition).filter(Boolean);
                if (fromPositions.length === 0) return;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

                path.id = `path-for-${toId}`;

                let pathData = "";
                fromPositions.sort((a, b) => a.cx - b.cx);

                if (fromPositions.length === 2) {
                    const leftParentPos = fromPositions[0];
                    const rightParentPos = fromPositions[1];

                    const leftParentEl = document.getElementById(leftParentPos.id);
                    const rightParentEl = document.getElementById(rightParentPos.id);

                    let anchorParentPos = leftParentPos;
                    if (leftParentEl && rightParentEl) {
                        const leftHasQr = leftParentEl.querySelector('.qr-code') !== null;
                        const rightHasQr = rightParentEl.querySelector('.qr-code') !== null;
                        if (leftHasQr && !rightHasQr) {
                            anchorParentPos = rightParentPos;
                        } else if (!leftHasQr && rightHasQr) {
                            anchorParentPos = leftParentPos;
                        }
                    }

                    const parentCenterY = anchorParentPos.top + (anchorParentPos.bottom - anchorParentPos.top) / 2;
                    const midX = (leftParentPos.cx + rightParentPos.cx) / 2;

                    pathData += `M ${leftParentPos.cx},${parentCenterY} L ${rightParentPos.cx},${parentCenterY} `;

                    const baseOffsetY = 120;
                    const maxAvailableSpace = 80;
                    const spacing = totalPairsInRound > 1 ? maxAvailableSpace / (totalPairsInRound - 1) : 0;
                    const yOffset = baseOffsetY - (pairIndex * spacing);
                    const verticalDropY = toPos.top - yOffset;

                    pathData += `M ${midX},${parentCenterY} L ${midX},${verticalDropY} `;
                    pathData += `L ${toPos.cx},${verticalDropY} `;
                    pathData += `L ${toPos.cx},${toPos.top} `;

                } else if (fromPositions.length === 1) {
                    const fromPos = fromPositions[0];
                    const midX = (fromPos.cx + toPos.cx) / 2;

                    pathData += `M ${fromPos.cx},${fromPos.bottom} L ${fromPos.cx},${fromPos.bottom + 40} `;
                    pathData += `L ${midX},${fromPos.bottom + 40} `;
                    pathData += `L ${midX},${toPos.top - 40} `;
                    pathData += `L ${toPos.cx},${toPos.top - 40} `;
                    pathData += `L ${toPos.cx},${toPos.top} `;
                }

                path.setAttribute("d", pathData);

                // 子ノードの先/後に応じて線の色を設定
                const toEl = document.getElementById(toId);
                if (toEl) {
                    if (toEl.classList.contains('pair-first')) {
                        path.classList.add('line-red');
                    } else if (toEl.classList.contains('pair-second')) {
                        path.classList.add('line-blue');
                    }
                }

                svg.appendChild(path);
            }

            for (let i = 0; i < rounds.length - 1; i++) {
                const parentRound = rounds[i + 1];
                let activePairsCount = 0;
                parentRound.forEach(n => {
                    if (n.participants && n.participants.length > 0) activePairsCount++;
                });

                let pairCounter = 0;
                parentRound.forEach((parentNode) => {
                    if (parentNode.participants && parentNode.participants.length > 0) {
                        const childIds = parentNode.participants.map(p => p.uniqueId);
                        connectCards(childIds, parentNode.uniqueId, 0, pairCounter, activePairsCount);
                        pairCounter++;
                    }
                });
            }
        }

        function setupQRCodeModal() {
            const modalOverlay = document.getElementById('modal-overlay');
            const modalContent = document.getElementById('modal-content');

            const modalCounterEl = document.getElementById('modal-counter');
            const closeModalBtn = document.getElementById('close-modal');
            const prevBtn = document.getElementById('modal-prev');
            const nextBtn = document.getElementById('modal-next');

            let qrList = [];
            let currentQrIndex = -1;

            const closeModal = () => {
                modalOverlay.style.display = 'none';
                modalContent.innerHTML = '';
                modalNameEl.textContent = '';
                modalCounterEl.textContent = '';
                document.getElementById('bracket-container').classList.remove('qr-blur-active');
                qrList = [];
                currentQrIndex = -1;
            };

            /**
             * 表示中のQRリストを構築する（非表示でないQRコードのみ）
             */
            function buildQrList() {
                const allQrs = document.querySelectorAll('#bracket-container .qr-code[data-id]');
                qrList = [];
                allQrs.forEach(el => {
                    // collapsed（非表示）ではない親カード内のQRのみ対象
                    const card = el.closest('.player-card');
                    if (card && !card.classList.contains('collapsed')) {
                        const nameEl = card.querySelector('.name');
                        let name = '';
                        if (nameEl) {
                            // birth-complete-label を除外して名前を取得
                            name = Array.from(nameEl.childNodes)
                                .filter(n => !n.classList || !n.classList.contains('birth-complete-label'))
                                .map(n => n.textContent)
                                .join('')
                                .trim();
                        }
                        qrList.push({
                            id: el.dataset.id,
                            name: name,
                            element: el
                        });
                    }
                });
            }

            /**
             * 指定インデックスのQRをモーダルに表示する
             */
            function showQrAtIndex(index) {
                if (index < 0 || index >= qrList.length) return;
                currentQrIndex = index;
                const item = qrList[index];

                // QRコード生成
                const qrContainer = document.createElement('div');
                qrContainer.style.background = 'white';
                qrContainer.style.padding = '15px';
                qrContainer.style.borderRadius = '8px';
                modalContent.innerHTML = '';
                modalContent.appendChild(qrContainer);
                const alphanumericOnlyQrData = item.id.replace(/[^a-zA-Z0-9]/g, '');
                new QRCode(qrContainer, {
                    text: alphanumericOnlyQrData,
                    width: 400,
                    height: 400
                });

                // 個体名を表示
                modalNameEl.textContent = item.name || item.id;

                // カウンターを表示
                modalCounterEl.textContent = `${index + 1} / ${qrList.length}`;

                // ナビボタンの表示/非表示
                prevBtn.style.visibility = index > 0 ? 'visible' : 'hidden';
                nextBtn.style.visibility = index < qrList.length - 1 ? 'visible' : 'hidden';
            }

            // QRコードクリックでモーダルを開く
            document.getElementById('bracket-container').addEventListener('click', (event) => {
                const qrEl = event.target.closest('.qr-code');
                if (!qrEl) return;
                event.stopPropagation();
                const qrData = qrEl.dataset.id;
                if (qrData) {
                    buildQrList();
                    // クリックされたQRのインデックスを検索
                    const clickedIndex = qrList.findIndex(q => q.element === qrEl);
                    if (clickedIndex === -1) return;

                    showQrAtIndex(clickedIndex);
                    modalOverlay.style.display = 'flex';
                    document.getElementById('bracket-container').classList.add('qr-blur-active');
                }
            });

            // ナビゲーションボタン
            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentQrIndex > 0) {
                    showQrAtIndex(currentQrIndex - 1);
                }
            });

            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentQrIndex < qrList.length - 1) {
                    showQrAtIndex(currentQrIndex + 1);
                }
            });

            // キーボードナビゲーション
            document.addEventListener('keydown', (e) => {
                if (modalOverlay.style.display !== 'flex') return;
                if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (currentQrIndex > 0) showQrAtIndex(currentQrIndex - 1);
                } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (currentQrIndex < qrList.length - 1) showQrAtIndex(currentQrIndex + 1);
                } else if (e.key === 'Escape') {
                    closeModal();
                }
            });

            closeModalBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (event) => {
                if (event.target === modalOverlay) {
                    closeModal();
                }
            });
        }

        function getAllAncestorIds(node, nodesMap) {
            let ancestors = new Set();
            function find(currentNode) {
                if (!currentNode || !currentNode.participants || currentNode.participants.length === 0) return;
                for (const parent of currentNode.participants) {
                    ancestors.add(parent.uniqueId);
                    const parentNode = nodesMap.get(parent.uniqueId);
                    if (parentNode) {
                        find(parentNode);
                    }
                }
            }
            find(node);
            return ancestors;
        }

                    ancestorIds.forEach(id => hiddenNodeIds.add(id));

                if (hiddenNodeIds.has(el.id)) {
                    el.classList.add('collapsed');
                } else {

        document.getElementById('generate-btn').addEventListener('click', () => {

            resetConversionUI();

            currentRoundsData = [];
            nodesMap.clear();
            if (!input) return;

            try {
                let stringToParse = input;
                let statusString = '';
                let formattedStatus = '';
                const treeForCheck = parseNode(stringToParse);
                const winnerName = treeForCheck.name;

                // ステータスの開始位置を「アンテナ:」または「頭:」で探す
                let statusStartIndex = winnerName.indexOf('アンテナ:');
                if (statusStartIndex === -1) {
                    statusStartIndex = winnerName.indexOf('頭:');
                }

                if (statusStartIndex !== -1) {
                    statusString = winnerName.substring(statusStartIndex);
                    const winnerNameOnly = winnerName.substring(0, statusStartIndex).trim();
                    const lastWinnerNameIndex = stringToParse.lastIndexOf(winnerName);
                    stringToParse = stringToParse.substring(0, lastWinnerNameIndex) + winnerNameOnly;
                }
                if (statusString) {
                    let tempStatus = statusString;
                    tempStatus = tempStatus.replace(
                        /(色:)([\s\S]*?)(?=(?:柄:|髪:|髪色:|肌色:|眉:|目:|鼻:|頬:|口:)|$)/,
                        (match, colorKeyword, colorText) => {
                            const processedText = colorText.trim().replace(/\s+/g, '&');
                            return colorKeyword + processedText + '\n';
                        }
                    );
                    formattedStatus = tempStatus.replace(/\s+/g, '\n').trim();
                }

                const tree = parseNode(stringToParse);
                const roundsData = [];

                function assignDepthAndId(node, depth, parentId = null) {
                    if (!roundsData[depth]) roundsData[depth] = [];
                    node.uniqueId = `d${depth}_${roundsData[depth].length}`;
                    node.parentId = parentId;
                    // リーフノードの場合、元のRSIDを保持する
                    if (!node.participants || node.participants.length === 0) {
                        node.originalId = node.id;
                    }
                    roundsData[depth].push(node);
                    node.participants.forEach(p => assignDepthAndId(p, depth + 1, node.uniqueId));
                }

                assignDepthAndId(tree, 0);
                const reversedRounds = [...roundsData].reverse();

                currentRoundsData = reversedRounds;

                nodesMap = new Map(currentRoundsData.flat().map(node => [node.uniqueId, node]));

                let html = "";
                let cardCounter = 0;
                reversedRounds.forEach((round, i) => {
                    const isChampionRound = i === reversedRounds.length - 1;
                    html += `<div class="round">`;
                    html += round.map(node => {

                        let pairName = "なし";
                        let childName = "なし";
                        let pairClass = '';

                        // ★追加: 親の名前を取得する処理
                        let parentsText = "なし";
                        if (node.participants && node.participants.length > 0) {
                            parentsText = node.participants.map(p => p.name.split(' ')[0]).join(' + ');
                        }

                        if (node.parentId) {
                            const childNode = nodesMap.get(node.parentId);
                            if (childNode) {
                                childName = childNode.name.split(' ')[0];
                                if (childNode.participants.length === 2) {
                                    const pairNode = childNode.participants.find(p => p.uniqueId !== node.uniqueId);
                                    if (pairNode) {
                                        pairName = pairNode.name.split(' ')[0];
                                    }

                                    if (childNode.participants[0].uniqueId === node.uniqueId) {
                                        pairClass = ' pair-first';
                                    } else if (childNode.participants[1].uniqueId === node.uniqueId) {
                                        pairClass = ' pair-second';
                                    }
                                }
                            }
                        }

                        // ★変更: 親:◯◯ を表示に追加
                        const relationHtml = `
                        <div class="relation-info">
                            <div>親: ${parentsText}</div>
                            <div>ペア: ${pairName}</div>
                            <div>子: ${childName}</div>
                        </div>`;

                        let nameSuffix = '';
                        if (pairClass.includes('pair-first')) nameSuffix = '(先)';
                        else if (pairClass.includes('pair-second')) nameSuffix = '(後)';

                        let cardStyle = ``;
                        const isLeafNode = !node.participants.length;
                        const collapsibleClass = !isLeafNode ? ' collapsible' : '';

                        const cardHtml = isChampionRound ?
                            `<div class="player-card champion-card collapsible${pairClass}" id="${node.uniqueId}" style="${cardStyle}">
                            <div class="face-preview-container"> <div class="part-layer preview-kami-rinkaku"></div> <div class="part-layer preview-hoo"></div> <div class="part-layer preview-me"></div> <div class="part-layer preview-mayu"></div> <div class="part-layer preview-hana"></div> <div class="part-layer preview-kuchi"></div> </div>
                            <div class="color-info-container"> <div class="color-info-item">髪色<div class="color-preview-box hair-color-box"></div></div> <div class="color-info-item">肌色<div class="color-preview-box skin-color-box"></div></div> </div>
                            <div class="custom-color-palette"></div>
                            <div class="name">${node.name.replace(' ', '<br>')}${nameSuffix}</div>
                            ${relationHtml}
                            ${formattedStatus ? `<div class="status">${formattedStatus}</div>` : ''}
                        </div>`
                            :
                            `<div class="player-card${collapsibleClass}${pairClass}" id="${node.uniqueId}" style="${cardStyle}">
                            <div class="name">${node.name}${nameSuffix}</div>
                            ${relationHtml}
                            ${!node.participants.length ? `<div class="qr-code" data-id="${node.id}"></div><div class="rsid-text">${node.id}</div>` : ''}
                        </div>`;

                        cardCounter++;
                        return cardHtml;
                    }).join('');
                    html += `</div>`;
                });
                container.insertAdjacentHTML('beforeend', html);

                document.querySelectorAll('.round').forEach(roundEl => {
                    const count = roundEl.querySelectorAll('.player-card').length;
                    if (count >= 12) { roundEl.classList.add('is-super-crowded'); }
                    else if (count >= 8) { roundEl.classList.add('is-crowded'); }
                    else if (count >= 4) { roundEl.classList.add('is-dense'); }
                });

                document.querySelectorAll('.qr-code').forEach(el => {
                    if (el.dataset.id) {
                        const originalId = el.dataset.id;
                        const alphanumericOnlyId = originalId.replace(/[^a-zA-Z0-9]/g, '');
                        new QRCode(el, {
                            text: alphanumericOnlyId,
                            width: 150,
                            height: 150
                        });
                    }
                });

                setupQRCodeModal();
                setupCollapseInteraction(nodesMap);
                setupHighlightInteraction(nodesMap);

                const championNode = reversedRounds[reversedRounds.length - 1][0];
                if (championNode) {
                    applyFaceParts(championNode.uniqueId, statusString);
                    applyAppearanceInfo(championNode.uniqueId, statusString);
                }

                requestAnimationFrame(() => {
                    // アニメーションなしで即座に線を描画
                    drawLines(currentRoundsData);
                });

                // --- 履歴をlocalStorageに保存（履歴からの読み込み時はスキップ） ---
                if (!isLoadingFromHistory) {
                    const championName = tree.name || '名称不明';
                    saveToHistory(championName, input);
                }
                isLoadingFromHistory = false;

            } catch (e) {
                errorEl.textContent = "エラー: " + e.message;
                errorEl.style.display = 'block';
            }
        });
